<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction App 🌾</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <!-- Left Column: Prediction Form -->
        <div class="col-lg-6 mb-4">
            <div class="card shadow-lg p-4" style="border-radius: 15px;">
                <h2 class="text-center mb-4">🌱 Crop Prediction App 🌱</h2>
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col">
                            <label>Nitrogen (N)</label>
                            <input type="number" class="form-control" name="N" required>
                        </div>
                        <div class="col">
                            <label>Phosphorus (P)</label>
                            <input type="number" class="form-control" name="P" required>
                        </div>
                        <div class="col">
                            <label>Potassium (K)</label>
                            <input type="number" class="form-control" name="K" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Temperature (°C)</label>
                        <input type="number" class="form-control" name="temperature" step="0.1" required>
                    </div>
                    <div class="mb-3">
                        <label>Humidity (%)</label>
                        <input type="number" class="form-control" name="humidity" step="0.1" required>
                    </div>
                    <div class="mb-3">
                        <label>pH</label>
                        <input type="number" class="form-control" name="ph" step="0.1" required>
                    </div>
                    <div class="mb-3">
                        <label>Rainfall (mm)</label>
                        <input type="number" class="form-control" name="rainfall" step="0.1" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Predict Crop</button>
                    </div>
                </form>

                {% if prediction_name %}
                <div class="alert alert-info mt-4 text-center" role="alert">
                    <h4>Predicted Crop:</h4>
                    <p><strong>{{ prediction_name }}</strong> (Crop No: {{ prediction_no }})</p>
                </div>
                {% endif %}
            </div>
        </div>

        <!-- Right Column: Crop Mapping Table -->
        <div class="col-lg-6 mb-4">
            <div class="card shadow-lg p-4" style="border-radius: 15px;">
                <h3 class="text-center mb-4">Crop Number → Crop Name</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Crop No</th>
                                <th>Crop Name</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for no, name in crop_map.items() %}
                            <tr>
                                <td>{{ no }}</td>
                                <td>{{ name }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
